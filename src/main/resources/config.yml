# Don't touch this
config-version: 11

debug: false
language: en
per-player-locale: false
prevent-creative-mode: true

# Only enable this if you are heavily modifying your quest pools/quests data in production (WHICH YOU SHOULDN'T)
purge-invalid-data-on-login: false

# Timer to try to unlock global quests and quest pools if for some reason the event driven method doesn't work
unlock-task:
  enabled: false
  # Interval in seconds
  interval: 5

command-aliases:
  quests: [ "quests", "quest" ]

# Specify the possible quest difficulties with their names
difficulties:
  easy: "Easy"
  medium: "Medium"
  hard: "Hard"

sort-order: [ "easy", "medium", "hard" ]

# Global tracking configuration
# on-track: commands to execute when a player tracks a quest (supports {player}, {quest}, {quest_id}, {pool_id} placeholders)
# on-untrack: commands to execute when a player untracks a quest
# tracked-lore: extra lore lines appended to the quest menu item when it is being tracked
# untracked-lore: extra lore lines appended to an active quest's menu item when it is NOT being tracked
tracking:
  on-track: []
  on-untrack: []
  tracked-lore:
    - "&e&l► TRACKED"
  # Counterpart of tracked-lore. Only shown on unlocked, non-completed, untracked quests.
  untracked-lore: []
  # When true: /quests unlock auto-tracks the unlocked quest (shows the scoreboard)
  # ONLY if the player has no other quest in progress.
  auto-track-on-unlock: false
  # Maximum number of quests a player can track at once (tracking queue).
  # Only the first tracked quest is shown (placeholders/scoreboard); when it is
  # completed, the next tracked quest takes its place. Use 0 or less for unlimited.
  max-tracked-quests: 5

leaderboards:
  # How many players should be cached for each quest pool?
  # Only for these players you will have top placeholders
  cache-size: 10
  # How many quest should be completed in the pool before adding the player to the leaderboard?
  min-completed: 3
  # Should we create leaderboards for global (not infinite) quest pools as well?
  # Only makes sense to enable this if you have a lot of quests, and they are not easy to complete fast
  include-global: false

# Auto chat centering: prefix a chat line with <center> to center it at render time,
# after placeholders are resolved (so variable-width values like {quest} stay centered).
# Works in quest-complete-message, level-up-message, display-components titles/lines
# and messages_xx.yml entries. The marker is removed from the rendered text.
# Half chat width in pixels the text is centered on. 154 = vanilla default (320px chat).
# Tune it if your effective chat width differs (client chat settings / resource pack).
chat-center-px: 154
# Pixel width assumed for characters outside Minecraft's default font table
# (resource-pack glyphs, CJK, ...). Accented Latin letters are measured from
# their base letter automatically.
unknown-char-width: 8
# Optional pixel widths for custom glyphs, e.g.:
# glyph-widths:
#   'ꕾ': 14   # raw resource-pack glyph character
#   lys: 12   # width applied to <glyph:lys> tags
# Single-character keys override any character; longer keys match <glyph:NAME> tags.
glyph-widths: { }

display-components:
  rewards:
    title: "  &7Rewards:&r"
    line: "    {reward}"

# These can be overridden by the quest itself
quest-complete-message:
  enabled: true
  message:
    - "  &f&l{quest} completed&r"
    - " "
    - "component:rewards"
    - " "

quest-complete-sound:
  enabled: true
  sound: "entity.player.levelup"
  volume: 1
  pitch: 1

# These will only be used if the quest pool has leveling enabled
level-up-message:
  enabled: true
  message:
    - "&3&m----------------------------------------&r"
    - ' '
    - "  &f&l{pool} levelled up &6&l{level}&r"
    - ' '
    - "component:rewards"
    - ' '
    - "&3&m----------------------------------------"

level-up-sound:
  enabled: true
  sound: "entity.player.levelup"
  volume: 1
  pitch: 1

# ===========================================================================
# Quest Book
# ---------------------------------------------------------------------------
# Places a clickable "quest book" item in a fixed inventory slot of every
# player. Clicking it runs the configured command(s) (e.g. opens the quest
# menu). The item is protected: it cannot be dropped, moved, swapped to the
# off-hand or lost on death.
#
# NOTE: Enabling this feature requires a server restart. Once enabled, you can
#       tweak the settings (or temporarily disable it) live with /quests reload.
# ===========================================================================
quest-book:
  enabled: false

  # Inventory slot the book is locked to (0-8 = hotbar, 9-35 = main inventory).
  slot: 17

  # Command(s) run when the player clicks the book. Supports Aurora action
  # prefixes ([player], [console], [open-gui], ...), {player} and PlaceholderAPI.
  click-commands:
    - "[player] quests"

  # Appearance of the book in its default state.
  initial-state:
    item:
      material: WRITTEN_BOOK
      custom-model-data: 0
      name: "&6&lQuest Book"
      lore:
        - ""
        - "&7Click to open your quests"
        - ""
    sound:
      sound: "item.book.page_turn"
      volume: 1.0
      pitch: 1.0

  # Appearance when a "new quest" notification is active.
  # Toggle it with /quests notify <player>. Reset to initial on click.
  new-quest-state:
    item:
      material: WRITTEN_BOOK
      custom-model-data: 1
      name: "&a&lQuest Book &e⭐"
      lore:
        - ""
        - "&aA new quest is available!"
        - "&7Click to open your quests"
        - ""
    sound:
      sound: "item.book.page_turn"
      volume: 1.0
      pitch: 1.2

# Quest sidebar shown ONLY while a player is tracking a quest (/quests track).
# Supports legacy (&), MiniMessage (<#hex>, <yellow>) and PlaceholderAPI.
# Max 15 lines (Minecraft limit). Available tokens:
#   {chapter} {quest_name} {step} {step_total} {display}
#   {reward}      -> a line with it repeats once per reward of the current step
#   {description} -> a line with it repeats once per description line of the current step
# NOTE: enabling requires a restart; afterwards /quests reload applies changes live.
scoreboard:
  enabled: false
  refresh-interval: 20
  # Hide the sidebar while a watched BetterHud popup is showing, then restore it
  # automatically when the popup ends (fixes the popup being drawn under the sidebar).
  # Requires BetterHud; if it is not installed the sidebar behaves exactly as before.
  # Set to false to keep the old behaviour (sidebar stays visible during popups).
  hide-during-popups: true
  # BetterHud popup groups (the popup file's `group:` value) that hide the sidebar
  # while active. Add more group names to watch additional popups; leave empty to
  # disable hiding even when hide-during-popups is true.
  hide-during-popup-groups:
    - "challenge"
  title: "&6&lQUEST"
  lines:
    - ""
    - "<#F7B700>{chapter} &7(&f{step}&7/&f{step_total}&7)"
    - "<#dedede>{quest_name}"
    - ""
    - " &8• &fObjective: <yellow>{display}"
    - " &8• &fRewards:"
    - "    &7- &f{reward}"
    - ""
    - "<#F7B700>Description"
    - "{description}"
    - ""